[[permission]]
identifier = "allow-desktop-bootstrap"
description = "Allows the main local window to read secret-free desktop connection state."
commands.allow = ["desktop_bootstrap"]

[[permission]]
identifier = "allow-desktop-pick-workspace"
description = "Allows the Rust backend to show a native folder picker and open one supervised workspace server."
commands.allow = ["desktop_pick_workspace"]

[[permission]]
identifier = "allow-desktop-close-workspace"
description = "Allows the main local window to gracefully close one owned workspace server."
commands.allow = ["desktop_close_workspace"]

[[permission]]
identifier = "allow-desktop-open-recent-workspace"
description = "Allows the Rust backend to reopen one native-stored recent workspace without disclosing its path."
commands.allow = ["desktop_open_recent_workspace"]

[[permission]]
identifier = "allow-desktop-catalog"
description = "Allows the main local window to query the bounded server-owned session catalog."
commands.allow = ["desktop_catalog"]

[[permission]]
identifier = "allow-desktop-session"
description = "Allows the main local window to create or reopen one server-owned conversation handle."
commands.allow = ["desktop_create_session", "desktop_open_session"]

[[permission]]
identifier = "allow-desktop-run"
description = "Allows the main local window to start or cooperatively cancel one run through the authenticated local server."
commands.allow = ["desktop_start_run", "desktop_cancel_run"]

[[permission]]
identifier = "allow-desktop-approval"
description = "Allows the main local window to resolve one exact server-guarded approval request."
commands.allow = ["desktop_resolve_approval"]

[[permission]]
identifier = "allow-desktop-verification"
description = "Allows the main local window to inspect and rerun one exact server-projected verification check."
commands.allow = ["desktop_verification", "desktop_rerun_verification"]
