[[permission]]
identifier = "allow-desktop-bootstrap"
description = "Allows the main local window to read secret-free desktop connection state."
commands.allow = ["desktop_bootstrap"]

[[permission]]
identifier = "allow-desktop-appearance"
description = "Allows the main local window to save one bounded application appearance enum and synchronize native chrome."
commands.allow = ["desktop_set_appearance"]

[[permission]]
identifier = "allow-desktop-external-url"
description = "Allows the main local window to open one native-validated HTTPS URL without exposing a generic opener capability."
commands.allow = ["desktop_open_external_url"]

[[permission]]
identifier = "allow-desktop-pick-workspace"
description = "Allows the Rust backend to show a native folder picker and open one supervised workspace server."
commands.allow = ["desktop_pick_workspace"]

[[permission]]
identifier = "allow-desktop-close-workspace"
description = "Allows the main local window to close one owned workspace server after active-run confirmation."
commands.allow = ["desktop_close_workspace"]

[[permission]]
identifier = "allow-desktop-open-recent-workspace"
description = "Allows the Rust backend to reopen one native-stored recent workspace without disclosing its path."
commands.allow = ["desktop_open_recent_workspace"]

[[permission]]
identifier = "allow-desktop-catalog"
description = "Allows the main local window to query the bounded server-owned session catalog."
commands.allow = ["desktop_catalog"]

[[permission]]
identifier = "allow-desktop-session-batch"
description = "Allows the main local window to preview and execute one server-revalidated bounded batch of conversation mutations."
commands.allow = ["desktop_plan_session_catalog_batch", "desktop_execute_session_catalog_batch"]

[[permission]]
identifier = "allow-desktop-session"
description = "Allows the main local window to create, reopen, read, rename, quarantine, or confirm deletion of one bounded server-owned conversation source."
commands.allow = ["desktop_create_session", "desktop_open_session", "desktop_rename_session", "desktop_delete_session", "desktop_quarantine_session", "desktop_delete_invalid_session_source", "desktop_transcript", "desktop_continuity", "desktop_run_context", "desktop_agent_activity"]

[[permission]]
identifier = "allow-desktop-run"
description = "Allows the main local window to start, reattach, or cooperatively cancel one run through the authenticated local server."
commands.allow = ["desktop_start_run", "desktop_attach_run", "desktop_cancel_run"]

[[permission]]
identifier = "allow-desktop-approval"
description = "Allows the main local window to resolve one exact server-guarded approval request."
commands.allow = ["desktop_resolve_approval"]

[[permission]]
identifier = "allow-desktop-verification"
description = "Allows the main local window to inspect and rerun one exact server-projected verification check."
commands.allow = ["desktop_verification", "desktop_rerun_verification"]

[[permission]]
identifier = "allow-desktop-support"
description = "Allows the main local window to read redacted diagnostics and ask the native shell to save a private support report."
commands.allow = ["desktop_support_doctor", "desktop_export_support_bundle"]
