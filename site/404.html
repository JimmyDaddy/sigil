<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found - Sigil</title>
    <meta name="description" content="The requested Sigil page could not be found.">
    <link rel="icon" href="/assets/logo/sigil-mark-staff-glow.svg">
    <meta name="theme-color" content="#1ecfc5">
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("sigil.theme");
          if (theme === "dark" || theme === "light") {
            document.documentElement.dataset.theme = theme;
          }
        } catch (_error) {}
      })();
    </script>
    <link rel="stylesheet" href="/assets/site.css">
    <script defer src="/assets/site.js"></script>
  </head>
  <body class="not-found">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <main class="not-found-panel" id="main-content">
      <img src="/assets/logo/sigil-mark-staff-glow.svg" alt="" width="72" height="72">
      <h1>Page not found</h1>
      <p>The page may have moved. Return home or open the documentation index.</p>
      <div class="hero-actions">
        <a class="button primary" href="/">Go home</a>
        <a class="button secondary" href="/docs/">Open docs</a>
      </div>
    </main>
  </body>
</html>
