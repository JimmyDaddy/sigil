version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps
    groups:
      cargo-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    commit-message:
      prefix: ci(deps)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/apps/desktop"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    commit-message:
      prefix: deps(desktop)
    groups:
      desktop-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
