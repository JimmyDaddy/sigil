name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  HOMEBREW_TAP_REPOSITORY: JimmyDaddy/homebrew-sigil
  RUST_TOOLCHAIN_VERSION: 1.94.1

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: macos-15-intel
          - os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install "${RUST_TOOLCHAIN_VERSION}"
          rustup default "${RUST_TOOLCHAIN_VERSION}"

      - name: Build release archive
        shell: bash
        run: scripts/build-release-archive.sh --out-dir dist

      - name: Generate provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sigil-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.22.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install npm CLI
        shell: bash
        run: npm install --global npm@11.18.0

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RELEASE_TAG}"
          mkdir -p dist
          find release-artifacts -maxdepth 3 -type f -exec cp {} dist/ \;
          cat dist/*.sha256 | sort -k2 > dist/checksums.txt
          scripts/generate-release-notes.sh "${RELEASE_TAG}" > RELEASE_NOTES.md

          darwin_arm_archive="$(find dist -maxdepth 1 -name 'sigil-*-aarch64-apple-darwin.tar.gz' | sort | head -n 1)"
          darwin_intel_archive="$(find dist -maxdepth 1 -name 'sigil-*-x86_64-apple-darwin.tar.gz' | sort | head -n 1)"
          if [[ -n "${darwin_arm_archive}" && -n "${darwin_intel_archive}" ]]; then
            arm_name="$(basename "${darwin_arm_archive}")"
            arm_sha="$(awk '{print $1}' "${darwin_arm_archive}.sha256")"
            intel_name="$(basename "${darwin_intel_archive}")"
            intel_sha="$(awk '{print $1}' "${darwin_intel_archive}.sha256")"
            scripts/render-homebrew-formula.sh \
              --version "${RELEASE_TAG#v}" \
              --arm-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${arm_name}" \
              --arm-sha256 "${arm_sha}" \
              --intel-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${intel_name}" \
              --intel-sha256 "${intel_sha}" \
              --formula-name sigil-ai \
              --output dist/sigil-ai.rb
          elif [[ -n "${darwin_arm_archive}" || -n "${darwin_intel_archive}" ]]; then
            darwin_archive="${darwin_arm_archive:-${darwin_intel_archive}}"
            archive_name="$(basename "${darwin_archive}")"
            archive_sha="$(awk '{print $1}' "${darwin_archive}.sha256")"
            scripts/render-homebrew-formula.sh \
              --version "${RELEASE_TAG#v}" \
              --url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${archive_name}" \
              --sha256 "${archive_sha}" \
              --formula-name sigil-ai \
              --output dist/sigil-ai.rb
          fi

          scripts/prepare-npm-packages.sh \
            --version "${RELEASE_TAG#v}" \
            --dist-dir dist \
            --out-dir release-npm-packages \
            --pack-destination dist

          {
            echo
            echo "## Release assets"
            echo
            for asset in dist/*; do
              echo "- \`$(basename "${asset}")\`"
            done
          } >> RELEASE_NOTES.md

      - name: Publish npm packages
        shell: bash
        run: |
          set -euo pipefail
          npm_tag="latest"
          if [[ "${RELEASE_TAG#v}" == *-* ]]; then
            npm_tag="alpha"
          fi
          scripts/publish-npm-packages.sh \
            --version "${RELEASE_TAG#v}" \
            --packages-dir release-npm-packages \
            --tag "${npm_tag}"

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail
          release_flags=()
          if [[ "${RELEASE_TAG#v}" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "${RELEASE_TAG}" dist/* \
            --title "Sigil ${RELEASE_TAG}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            "${release_flags[@]}"

  sync-homebrew:
    name: Sync Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: sigil-homebrew-tap-sync
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          ref: main
          path: homebrew-sigil
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Download published formula
        shell: bash
        run: |
          set -euo pipefail
          formula_dir="${RUNNER_TEMP}/sigil-homebrew-formula"
          mkdir -p "${formula_dir}"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern sigil-ai.rb \
            --dir "${formula_dir}"
          test -s "${formula_dir}/sigil-ai.rb"

      - name: Commit and push formula
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          formula_source="${RUNNER_TEMP}/sigil-homebrew-formula/sigil-ai.rb"
          formula_target="homebrew-sigil/Formula/sigil-ai.rb"

          grep -Fq "version \"${version}\"" "${formula_source}"
          install -m 0644 "${formula_source}" "${formula_target}"
          ruby -c "${formula_target}"

          git -C homebrew-sigil add Formula/sigil-ai.rb
          if git -C homebrew-sigil diff --cached --quiet; then
            echo "Homebrew tap already references ${version}"
            exit 0
          fi

          git -C homebrew-sigil config user.name "github-actions[bot]"
          git -C homebrew-sigil config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-sigil commit -m "chore: update sigil-ai to ${version}"
          git -C homebrew-sigil push origin HEAD:main
