name: Dependency Supply Chain

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/dependency-supply-chain.yml"
      - ".github/dependabot.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "apps/desktop/package.json"
      - "apps/desktop/pnpm-lock.yaml"
      - "apps/desktop/src-tauri/Cargo.toml"
      - "crates/**/Cargo.toml"
      - "deny.toml"
      - "dev/governance/dependency-supply-chain.md"
      - "scripts/check-supply-chain-policy.py"
      - "scripts/test-check-supply-chain-policy.py"
  pull_request:
    paths:
      - ".github/workflows/dependency-supply-chain.yml"
      - ".github/dependabot.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "apps/desktop/package.json"
      - "apps/desktop/pnpm-lock.yaml"
      - "apps/desktop/src-tauri/Cargo.toml"
      - "crates/**/Cargo.toml"
      - "deny.toml"
      - "dev/governance/dependency-supply-chain.md"
      - "scripts/check-supply-chain-policy.py"
      - "scripts/test-check-supply-chain-policy.py"
  schedule:
    - cron: "17 18 * * 4"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_AUDIT_VERSION: 0.22.2
  RUST_TOOLCHAIN_VERSION: 1.94.1

jobs:
  policy-consistency:
    name: Advisory exception policy consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test policy consistency checker
        run: python3 scripts/test-check-supply-chain-policy.py

      - name: Match deny, audit, and governance exceptions
        run: python3 scripts/check-supply-chain-policy.py

  cargo-deny:
    name: Licenses, sources, bans, and advisories
    needs: policy-consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enforce committed cargo-deny policy
        uses: EmbarkStudios/cargo-deny-action@v2.1.1
        with:
          rust-version: ${{ env.RUST_TOOLCHAIN_VERSION }}
          command: check
          arguments: --all-features

  cargo-audit:
    name: Independent RustSec lockfile audit
    needs: policy-consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked

      - name: Audit lockfile with reviewed exceptions
        run: >-
          cargo audit
          --ignore RUSTSEC-2024-0370
          --ignore RUSTSEC-2024-0411
          --ignore RUSTSEC-2024-0412
          --ignore RUSTSEC-2024-0413
          --ignore RUSTSEC-2024-0414
          --ignore RUSTSEC-2024-0415
          --ignore RUSTSEC-2024-0416
          --ignore RUSTSEC-2024-0417
          --ignore RUSTSEC-2024-0418
          --ignore RUSTSEC-2024-0419
          --ignore RUSTSEC-2024-0420
          --ignore RUSTSEC-2024-0429
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0075
          --ignore RUSTSEC-2025-0080
          --ignore RUSTSEC-2025-0081
          --ignore RUSTSEC-2025-0098
          --ignore RUSTSEC-2025-0100
          --ignore RUSTSEC-2025-0141

  pnpm-audit:
    name: Desktop npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install locked desktop dependencies
        run: pnpm --dir apps/desktop install --frozen-lockfile

      - name: Audit desktop dependency graph
        run: pnpm --dir apps/desktop audit --audit-level high
