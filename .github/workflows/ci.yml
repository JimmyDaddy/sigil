name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "scripts/coverage.sh"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "scripts/coverage.sh"

permissions:
  contents: read

concurrency:
  # Supersede stale CI attempts during rapid push batches. Older attempts may
  # show GitHub's "operation was canceled" even when tests were still passing.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_LLVM_COV_VERSION: 0.8.7
  RUST_TOOLCHAIN_VERSION: 1.94.1

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  check:
    needs: fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check --locked
        run: cargo check --locked

  test:
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-runtime-tools
            packages: "-p sigil-kernel -p sigil-tools-builtin -p sigil-mcp -p sigil-runtime"
          - name: providers
            packages: "-p sigil-provider-deepseek -p sigil-provider-openai-compat -p sigil-provider-anthropic -p sigil-provider-gemini"
          - name: automation-surfaces
            packages: "-p sigil-code-intel -p sigil-http -p sigil"
          - name: tui
            packages: "-p sigil-tui"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test --locked (${{ matrix.name }})
        run: cargo test --locked ${{ matrix.packages }}

  clippy:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy --locked --all-targets -- -D warnings
        run: cargo clippy --locked --all-targets -- -D warnings

  coverage:
    needs:
      - test
      - clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: |
          if ! cargo llvm-cov --version 2>/dev/null | grep -q "$CARGO_LLVM_COV_VERSION"; then
            cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
          fi

      - name: coverage report
        run: ./scripts/coverage.sh
