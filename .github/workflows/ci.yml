name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "scripts/coverage.sh"
      - "scripts/tui-web-pty-acceptance.py"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "scripts/coverage.sh"
      - "scripts/tui-web-pty-acceptance.py"

permissions:
  contents: read

concurrency:
  # Supersede stale CI attempts during rapid push batches. Older attempts may
  # show GitHub's "operation was canceled" even when tests were still passing.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_LLVM_COV_VERSION: 0.8.7
  RUST_TOOLCHAIN_VERSION: 1.94.1

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  check:
    needs: fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check --locked
        run: cargo check --locked

  test:
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-runtime-tools
            packages: "sigil-kernel sigil-tools-builtin sigil-mcp sigil-runtime"
          - name: providers
            packages: "sigil-provider-deepseek sigil-provider-openai-compat sigil-provider-anthropic sigil-provider-gemini"
          - name: automation-surfaces
            packages: "sigil-code-intel sigil-http sigil"
          - name: tui
            packages: "sigil-tui"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: |
          if ! cargo llvm-cov --version 2>/dev/null | grep -q "$CARGO_LLVM_COV_VERSION"; then
            cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
          fi

      - name: Clean coverage artifacts
        run: cargo llvm-cov clean --workspace

      - name: cargo llvm-cov --no-report (${{ matrix.name }})
        run: COVERAGE_NO_REPORT=1 COVERAGE_PACKAGES="${{ matrix.packages }}" ./scripts/coverage.sh

      - name: Archive coverage profiles
        run: tar -C target -czf coverage-${{ matrix.name }}.tar.gz llvm-cov-target

      - name: Upload coverage profiles
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: coverage-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  clippy:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy --locked --all-targets -- -D warnings
        run: cargo clippy --locked --all-targets -- -D warnings

  tui-web-v1-pty-acceptance:
    name: TUI Web V1 PTY acceptance
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build production Sigil binary
        run: cargo build --locked -p sigil

      - name: Run deterministic Web V1 real-PTY acceptance
        run: timeout 150s python3 scripts/tui-web-pty-acceptance.py --binary target/debug/sigil

      - name: Upload Web V1 PTY acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tui-web-v1-pty-acceptance
          path: .repo-local-dev/tui-smoke/tui-web-pty-acceptance-*
          if-no-files-found: warn
          retention-days: 7

  coverage:
    needs:
      - test
      - clippy
      - tui-web-v1-pty-acceptance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Download coverage profiles
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Install cargo-llvm-cov
        run: |
          if ! cargo llvm-cov --version 2>/dev/null | grep -q "$CARGO_LLVM_COV_VERSION"; then
            cargo install cargo-llvm-cov --version "$CARGO_LLVM_COV_VERSION" --locked
          fi

      - name: Restore coverage profiles
        run: |
          mkdir -p target
          find coverage-artifacts -name "coverage-*.tar.gz" -print -exec tar -xzf {} -C target \;

      - name: coverage report
        run: COVERAGE_REPORT_ONLY=1 ./scripts/coverage.sh
