name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Locate browser for responsive layout checks
        run: |
          browser=""
          for candidate in google-chrome google-chrome-stable chromium chromium-browser; do
            if command -v "${candidate}" >/dev/null 2>&1; then
              browser="$(command -v "${candidate}")"
              break
            fi
          done
          if [[ -z "${browser}" ]]; then
            echo "Chrome or Chromium is required for responsive layout checks" >&2
            exit 1
          fi
          "${browser}" --version
          echo "SIGIL_SITE_BROWSER=${browser}" >> "${GITHUB_ENV}"

      - name: Check static site
        run: scripts/check-pages-site.sh

      - name: Prepare static site
        run: scripts/build-pages-site.sh _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
