[workspace]
root = "."

[agent]
provider = "gemini"
model = "gemini-2.5-pro"
tool_timeout_secs = 30

[model_request]
request_timeout_secs = 120
stream_idle_timeout_secs = 180

[permission]
preset = "balanced"
default_mode = "ask"

[permission.access]
read = "allow"

[providers.gemini]
base_url = "https://generativelanguage.googleapis.com/v1beta"
# Prefer SIGIL_GEMINI_API_KEY.
# api_key = "..."
