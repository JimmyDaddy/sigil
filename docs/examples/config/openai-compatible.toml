[workspace]
root = "."

[agent]
provider = "openai_compat"
model = "gpt-4.1"
tool_timeout_secs = 30

[permission]
preset = "balanced"
default_mode = "ask"

[permission.access]
read = "allow"

[providers.openai_compat]
base_url = "https://api.openai.com/v1"
model = "gpt-4.1"
# Prefer SIGIL_OPENAI_COMPATIBLE_API_KEY or OPENAI_API_KEY.
# api_key = "sk-..."
