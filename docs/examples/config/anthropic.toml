[workspace]
root = "."

[agent]
provider = "anthropic"
model = "claude-sonnet-4-5"
tool_timeout_secs = 30

[model_request]
request_timeout_secs = 120
stream_idle_timeout_secs = 180

[permission]
mode = "manual"

[providers.anthropic]
base_url = "https://api.anthropic.com"
anthropic_version = "2023-06-01"
max_tokens = 4096
# Prefer SIGIL_ANTHROPIC_API_KEY.
# api_key = "sk-ant-..."
